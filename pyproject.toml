[project]
name = "hyper_fingerprints"
version = "0.1.0"
description = "Hyperdimensional molecular fingerprints using Vector Symbolic Architectures"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "torch>=2.0",
    "torch-geometric>=2.4",
    "torchhd>=5.0",
    "rdkit>=2023.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]
cpu = [
    "torch>=2.0",
]
cuda = [
    "torch>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
